version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused
    - misspell

  settings:
    misspell:
      locale: US

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - unused

formatters:
  enable:
    - gofmt
    - goimports
